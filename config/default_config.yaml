# SEM Blade Tip Radius Analyzer — hybrid measurement protocol

pipeline:
  # Arch-first protocol: complete contours → validated apex → Methods 1–3 (same tip IDs).
  arch_first: true
  # Legacy skyline/Harris peak + Hough path (accepts border-touching peaks — off by default).
  legacy_peak_detection: false

calibration:
  nm_per_pixel: 1.0
  metadata_key: "pixel_size_nm"
  reject_resized_without_factor: true
  # Do NOT apply blind 1/cos(tilt) scaling. Store tilt metadata; report projected_* values.
  tilt_correction:
    enabled: false
    tilt_angle_deg: 60.0
    warning: >
      Stage tilt metadata is stored but NOT used to scale measurements.
      Results are projected_radius_nm / projected distances until SEM geometry is confirmed.

preprocessing:
  border_margin_px: 10
  info_bar_crop_ratio: 0.0
  denoise_method: "bilateral"
  clahe_clip_limit: 2.0
  clahe_tile_size: 8
  bilateral_d: 7
  bilateral_sigma_color: 40
  bilateral_sigma_space: 40
  pm_iterations: 15
  pm_kappa: 0.1
  pm_gamma: 0.15
  nlm_h: 0.08
  nlm_patch_size: 5
  nlm_patch_distance: 6

edge_detection:
  edge_mode: "canny_scharr"
  consensus_methods:
    - canny
    - scharr
  consensus_vote_ratio: 0.5
  gradient_percentile: 85.0
  adaptive_block_size: 31
  adaptive_c: 5
  canny_low: 40
  canny_high: 120
  canny_auto: true
  canny_sigma: 0.33
  morph_close_kernel: 3
  min_component_area_px: 20
  harris_block_size: 5
  harris_ksize: 3
  harris_k: 0.04
  harris_threshold: 0.01
  harris_search_radius: 450
  skyline_prominence: 1.0
  skyline_min_distance: 3
  row_skyline_prominence: 1.0
  row_skyline_min_distance: 4
  peak_dedup_distance: 5.0
  blade_margin_ratio: 0.05
  global_use_harris: false
  harris_centerline_dist_px: 12.0
  hough_line_threshold: 50
  hough_line_min_length: 30
  hough_line_max_gap: 10

tip_validation:
  min_branch_points: 20
  border_px: 10
  minimum_tip_spacing_nm: 40.0
  max_fit_residual_px: 2.0
  min_contour_length_px: 40
  method1_stability_threshold: 0.20
  method2_min_cross: 0.15

shape_detection:
  adaptive_block_size: 11
  adaptive_c: 2
  min_area_px: 50
  circularity_threshold: 0.6
  hough_dp: 1.2
  hough_min_dist: 20
  hough_param1: 50
  hough_param2: 30
  hough_min_radius: 5
  hough_max_radius: 200

deduction:
  min_circularity: 0.4
  max_aspect_ratio: 5.0
  min_solidity: 0.5
  border_margin_px: 10
  confidence_threshold: 0.5
  isolation_forest_contamination: 0.1

radius:
  primary_method: "hough"
  aggregation: "median"
  hough_roi_size: 60
  hough_dp: 1.2
  hough_min_dist: 10
  hough_param1: 50
  hough_param2: 25
  hough_min_radius: 3
  hough_max_radius: 60
  edge_window_px: 25

tip_classification:
  sharp_max_nm: 10.0
  moderate_max_nm: 50.0

protocol:
  approved: false
  approved_by: null
  notes: >
    Proposed defaults pending client approval of Method 1 l, Method 2 fit band,
    and Method 3 Interpretation A (angle at D). See docs/CALCULATION_BASIS.md.
  method1_distances_nm: [25, 50, 100, 200]
  method1_primary_nm: 100
  method2_fit_band_nm: [50, 200]
  method3_circle_diameter_nm: 100
  method3_definition: "interpretation_A_circle_at_apex"

measurement_methods:
  local_contour_window_y_px: 80
  local_contour_window_x_px: 40
  min_branch_depth_nm: 50
  dedup_distance_nm: 40
  parallel_sep_nm: 10
  plausible_radius_nm: [2, 500]
  require_outer_surface: false
  fixed_distance_circle:
    distances_nm: [25, 50, 100, 200]
    primary_nm: 100
  projected_tip_distance:
    fit_band_nm: [50, 200]
    min_flank_points: 5
  inscribed_angle:
    circle_diameter_nm: 100
    tangent_from: "apex_to_intersections"
    tangent_length: 80.0
  confidence_weights:
    edge: 0.25
    continuity: 0.20
    fit: 0.20
    symmetry: 0.15
    stability: 0.20

annotation:
  scale_bar_nm: 50
  scale_bar_position: "bottom-right"
  output_dpi: 300

validation:
  alignment_max_distance_px: 50

research_grade:
  enabled: false
  apex_exclusion_px: 15.0
  flank_fraction: 0.35
  tip_region_fraction: 0.35
  curvature_smooth_window: 5
  ransac_threshold_px: 2.0
  geometry_tolerance_ratio: 0.25
  min_confidence: 0.3
  tip_window_factor: 1.5
  confidence_weights:
    residual: 0.30
    overlap: 0.30
    inliers: 0.20
    geometry: 0.20
